name: Fullstack CI/CD

on:
  push:
    branches: [main]
  pull_request:

jobs:

  # =========================
  # FRONTEND JOB
  # =========================
  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Lint Check
        working-directory: ./frontend
        run: npm run lint

      - name: Run Tests
        working-directory: ./frontend
        run: npm run test

      - name: Build
        working-directory: ./frontend
        run: npm run build


  # =========================
  # BACKEND JOB
  # =========================
  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        working-directory: ./Backend
        run: npm ci

      - name: Lint Check
        working-directory: ./Backend
        run: npm run lint || echo "No lint configured"

      - name: Run Unit Tests
        working-directory: ./Backend
        run: npm test || echo "No tests yet"


  # =========================
  # INTEGRATION TEST
  # =========================
  integration:
    runs-on: ubuntu-latest
    needs: [frontend, backend]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Start Backend
        working-directory: ./Backend
        run: |
          npm ci
          npm start &

      - name: Wait for Server
        run: sleep 10

      - name: Test API
        run: curl http://localhost:5000 || exit 1


  # =========================
  # DEPLOY TO EC2 (BONUS)
  # =========================
  deploy:
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd project
            git pull
            npm install
            pm2 restart all